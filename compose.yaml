services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      SQLCMDPASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - "${HOME}/.queryadvisor/sqlserver:/var/opt/mssql"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          /opt/mssql-tools/bin/sqlcmd
          -S localhost -U sa -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
